services:
  - type: web
    name: blog-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000 --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
    plan: free

databases:
  - name: blog-db
    databaseName: blog
    user: blog_user
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all inbound traffic
